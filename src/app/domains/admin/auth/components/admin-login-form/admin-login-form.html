<form class="grid gap-4" [formGroup]="fg" (ngSubmit)="onSubmit()">
  <div class="flex flex-col gap-1">
    <label for="admin-login-email" class="text-slate-700 font-semibold dark:text-slate-200">{{ 'AUTH.EMAIL' | translate }}</label>
    <app-input-error-message [fc]="fg.controls.email" />
    <input
      pInputText
      formControlName="email"
      type="email"
      id="admin-login-email"
      class="w-full"
      [placeholder]="'AUTH.EMAIL_PLACEHOLDER' | translate"
    />
  </div>

  <div class="flex flex-col gap-1">
    <label for="admin-login-password" class="text-slate-700 font-semibold dark:text-slate-200">{{ 'AUTH.PASSWORD' | translate }}</label>
    <app-input-error-message [fc]="fg.controls.password" />
    <p-password
      inputId="admin-login-password"
      class="w-full"
      styleClass="w-full"
      formControlName="password"
      [placeholder]="'AUTH.PASSWORD_PLACEHOLDER' | translate"
      [toggleMask]="true"
      [feedback]="false"
    />
  </div>

  <label class="flex items-center gap-2">
    <input type="checkbox" [checked]="rememberLogin" (change)="rememberLogin = $any($event.target).checked" />
    <span>{{ 'AUTH.REMEMBER_ME' | translate }}</span>
  </label>

  @if (backendError()) {
    <p class="text-red-700 text-sm font-bold dark:text-red-400">{{ backendError() }}</p>
  }

  <p-button
    type="submit"
    styleClass="w-full"
    [label]="'AUTH.LOGIN_ADMIN' | translate"
    [loading]="isSubmitting()"
  />
</form>
