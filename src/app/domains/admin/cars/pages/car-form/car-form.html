<section class="grid gap-6">
  <div>
    <span class="text-xs font-bold uppercase tracking-widest text-blue-600 dark:text-blue-400">{{ 'ADMIN_CARS.FORM_KICKER' | translate }}</span>
    <h1 class="mt-3 text-slate-900 text-4xl md:text-5xl font-bold dark:text-white">{{ (isCreate ? 'ADMIN_CARS.CREATE_TITLE' : 'ADMIN_CARS.EDIT_TITLE') | translate }}</h1>
  </div>

  @if (loading) {
    <p class="text-slate-600 dark:text-slate-300">{{ 'ADMIN_CARS.LOADING' | translate }}</p>
  } @else {
    <form class="grid gap-6 p-6 rounded-3xl bg-white/80 border border-slate-300/20 dark:bg-slate-900/80" [formGroup]="carForm" (ngSubmit)="onSubmit()">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="grid gap-1.5">
          <label for="car-name" class="text-sm font-semibold text-slate-700 dark:text-slate-200">{{ 'ADMIN_CARS.NAME' | translate }}</label>
          <app-input-error-message [fc]="carForm.controls.name" />
          <input pInputText type="text" id="car-name" formControlName="name" [placeholder]="'ADMIN_CARS.NAME_PLACEHOLDER' | translate" class="w-full" />
        </div>

        <div class="grid gap-1.5">
          <label for="car-brand" class="text-sm font-semibold text-slate-700 dark:text-slate-200">{{ 'ADMIN_CARS.BRAND' | translate }}</label>
          <app-input-error-message [fc]="carForm.controls.brand" />
          <input pInputText type="text" id="car-brand" formControlName="brand" [placeholder]="'ADMIN_CARS.BRAND_PLACEHOLDER' | translate" class="w-full" />
        </div>

        <div class="grid gap-1.5">
          <label for="car-model" class="text-sm font-semibold text-slate-700 dark:text-slate-200">{{ 'ADMIN_CARS.MODEL' | translate }}</label>
          <app-input-error-message [fc]="carForm.controls.model" />
          <input pInputText type="text" id="car-model" formControlName="model" [placeholder]="'ADMIN_CARS.MODEL_PLACEHOLDER' | translate" class="w-full" />
        </div>

        <div class="grid gap-1.5">
          <label for="car-kilometers" class="text-sm font-semibold text-slate-700 dark:text-slate-200">{{ 'ADMIN_CARS.KILOMETERS' | translate }}</label>
          <app-input-error-message [fc]="carForm.controls.kilometers" />
          <input pInputText type="number" id="car-kilometers" formControlName="kilometers" min="0" class="w-full" />
        </div>

        <div class="grid gap-1.5">
          <label for="car-price" class="text-sm font-semibold text-slate-700 dark:text-slate-200">{{ 'ADMIN_CARS.PRICE_PER_DAY' | translate }}</label>
          <app-input-error-message [fc]="carForm.controls.price_per_day" />
          <input pInputText type="number" id="car-price" formControlName="price_per_day" min="0" class="w-full" />
        </div>
      </div>

      <div class="flex gap-3 flex-wrap">
        <button type="submit" class="inline-flex items-center justify-center px-5 py-3 rounded-full font-bold text-white bg-gradient-to-br from-blue-600 to-slate-900 hover:opacity-90 transition-opacity disabled:opacity-60 disabled:cursor-not-allowed" [disabled]="saving">
          {{ (saving ? 'ADMIN_CARS.SAVING' : 'ADMIN_CARS.SAVE') | translate }}
        </button>
        <a routerLink="/admin/cars" class="inline-flex items-center justify-center px-5 py-3 rounded-full font-bold text-slate-900 bg-slate-200/80 hover:bg-slate-300/80 transition-colors dark:text-white dark:bg-slate-800 dark:hover:bg-slate-700">
          {{ 'ADMIN_CARS.CANCEL' | translate }}
        </a>
      </div>
    </form>
  }
</section>
