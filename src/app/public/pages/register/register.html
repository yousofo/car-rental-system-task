<div class="auth-page min-h-screen p-3 sm:p-5">
  <app-shared-header />

  <section class="auth-stage grid grid-cols-1 lg:grid-cols-[0.95fr_0.8fr] gap-6 mt-6 items-start">
    <aside class="auth-copy p-5 sm:p-8 border border-slate-300/20 rounded-[2rem] bg-white/80 backdrop-blur-md dark:bg-slate-900/80 dark:border-slate-700/20">
      <span class="auth-kicker text-emerald-600 text-sm font-bold uppercase tracking-widest dark:text-emerald-400">{{ 'AUTH.REGISTER_KICKER' | translate }}</span>
      <h1 class="my-4 text-slate-900 font-bold leading-[0.95] dark:text-white" style="font-size: clamp(2.4rem, 5vw, 4.3rem);">{{ 'AUTH.REGISTER_TITLE' | translate }}</h1>
      <p class="text-slate-600 max-w-[40rem] dark:text-slate-300">{{ 'AUTH.REGISTER_COPY' | translate }}</p>
      <a routerLink="/login" class="auth-link inline-block mt-4 text-blue-700 font-semibold no-underline dark:text-blue-400">{{ 'AUTH.GO_TO_LOGIN' | translate }}</a>
    </aside>

    <div class="auth-card p-5 sm:p-8 border border-slate-300/20 rounded-[2rem] bg-white/80 backdrop-blur-md dark:bg-slate-900/80 dark:border-slate-700/20">
      <div class="role-switch relative grid grid-cols-2 gap-1 p-1.5 rounded-full bg-slate-200/90 mb-6 dark:bg-slate-800" [attr.data-role]="role()">
        <span class="role-thumb-register"></span>
        <button type="button" class="relative z-10 border-0 py-3.5 px-4 rounded-full bg-transparent text-slate-600 font-semibold cursor-pointer dark:text-slate-300" [class.text-white]="role() === 'customer'" (click)="role.set('customer')">
          {{ 'AUTH.CUSTOMER' | translate }}
        </button>
        <button type="button" class="relative z-10 border-0 py-3.5 px-4 rounded-full bg-transparent text-slate-600 font-semibold cursor-pointer dark:text-slate-300" [class.text-white]="role() === 'admin'" (click)="role.set('admin')">
          {{ 'AUTH.ADMIN' | translate }}
        </button>
      </div>

      @if (role() === 'customer') {
        <app-customer-register-form />
      } @else {
        <app-admin-register-form />
      }
    </div>
  </section>
</div>
